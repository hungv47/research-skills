<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 3.5 L 0 7 z" fill="#93C5FD"/></marker>
    <marker id="arr-g" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 3.5 L 0 7 z" fill="#9CA3AF"/></marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="260" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>

  <!-- Foundation -->
  <text x="80" y="30" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">FOUNDATION</text>
  <rect x="20" y="40" width="120" height="36" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="80" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A5F">icp-research</text>

  <!-- product-context.md output -->
  <path d="M 140 58 L 200 58" stroke="#60A5FA" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <text x="210" y="52" font-size="8" fill="#3B82F6" font-style="italic">product-context.md</text>
  <text x="210" y="64" font-size="8" fill="#3B82F6" font-style="italic">→ feeds 12+ downstream skills</text>

  <!-- Diagnosis track -->
  <text x="100" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">DIAGNOSIS</text>
  <rect x="20" y="120" width="140" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="90" y="142" text-anchor="middle" font-size="11" fill="#1E3A5F">market-research</text>

  <rect x="20" y="168" width="140" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="90" y="190" text-anchor="middle" font-size="11" fill="#1E3A5F">problem-analysis</text>

  <!-- Arrows to solution-design -->
  <path d="M 160 138 L 200 155" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <path d="M 160 186 L 200 165" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>

  <!-- Strategy track -->
  <text x="320" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">STRATEGY</text>
  <rect x="200" y="120" width="140" height="76" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="270" y="155" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A5F">solution-design</text>
  <text x="270" y="170" text-anchor="middle" font-size="8" fill="#3B82F6">ICE scoring + trade-offs</text>

  <!-- Arrow to funnel-planner -->
  <path d="M 340 158 L 390 158" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text x="365" y="150" font-size="7" fill="#6B7280" font-style="italic">solution-design.md</text>

  <!-- Targets track -->
  <text x="480" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">TARGETS</text>
  <rect x="390" y="120" width="130" height="76" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="455" y="155" text-anchor="middle" font-size="12" fill="#1E3A5F">funnel-planner</text>
  <text x="455" y="170" text-anchor="middle" font-size="8" fill="#3B82F6">revenue → traffic model</text>

  <!-- Arrow to experiment -->
  <path d="M 520 158 L 570 158" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text x="545" y="150" font-size="7" fill="#6B7280" font-style="italic">targets.md</text>

  <!-- Validation track -->
  <text x="650" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">VALIDATION</text>
  <rect x="570" y="120" width="130" height="76" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="635" y="155" text-anchor="middle" font-size="12" fill="#1E3A5F">experiment</text>
  <text x="635" y="170" text-anchor="middle" font-size="8" fill="#3B82F6">MVP tests + decision rules</text>

  <!-- Parallel label -->
  <text x="90" y="222" text-anchor="middle" font-size="8" fill="#6B7280" font-style="italic">run in parallel</text>
  <line x1="40" y1="215" x2="140" y2="215" stroke="#93C5FD" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>